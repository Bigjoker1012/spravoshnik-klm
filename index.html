<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КЛМ Справочник</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.hex { width: 100px; height: 110px; background: #2563eb; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; text-align: center; color: white; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
.hex:hover { transform: scale(1.1); background: #1d4ed8; }
.card { background: white; border-radius: 12px; padding: 15px; margin: 10px auto; max-width: 400px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #2563eb; }
</style>
</head>
<body class="bg-gray-100 font-sans p-5">

<h1 class="text-center text-xl font-black my-6 text-blue-900 uppercase">КЛМ Справочник</h1>

<div id="grid" class="flex flex-wrap justify-center gap-2 mb-10"></div>
<div id="list" class="px-4 pb-10">
    <p class="text-center text-gray-500">Нажмите на соту-отдел...</p>
</div>

<script>
    // ЗАМЕНИ ССЫЛКУ НИЖЕ НА СВОЮ ИЗ GOOGLE (CSV)
    const CSV_URL = '[https://docs.google.com/spreadsheets/d/1nualyTma75WZ4eZlVuPEPMDqz94qmCx5blby-9tZCOU/edit?usp=sharing](https://docs.google.com/spreadsheets/d/e/2PACX-1vS690f9y3f0UvE77yF1U_uGj8u9q89-EXAMPLE/pub?output=csv)';

    async function start() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const lines = text.split('\n').map(l => l.split(','));
            
            const people = lines.slice(1).map(c => ({
                name: c[1]?.trim(),
                pos: c[2]?.trim(),
                dept: c[3]?.trim(),
                phone: c[4]?.trim()
            })).filter(p => p.name);

            const depts = [...new Set(people.map(p => p.dept))].filter(Boolean);
            const grid = document.getElementById('grid');
            
            grid.innerHTML = depts.map(d => `
                <div class="hex" onclick="show('${d}')">${d}</div>
            `).join('');

            window.show = (selected) => {
                const list = document.getElementById('list');
                const filtered = people.filter(p => p.dept === selected);
                
                list.innerHTML = `<h2 class="text-center font-bold mb-4 text-blue-700 uppercase">${selected}</h2>` + 
                filtered.map(p => `
                    <div class="card">
                        <div class="font-bold text-lg">${p.name}</div>
                        <div class="text-sm text-gray-600 mb-2">${p.pos}</div>
                        <a href="tel:${p.phone}" class="text-blue-600 font-bold underline">${p.phone}</a>
                    </div>
                `).join('');
            };

        } catch (e) {
            document.getElementById('list').innerHTML = "Ошибка связи с таблицей.";
        }
    }
    start();
</script>
</body>
</html>
